name: npm-publish-dry-run

on:
  push:
    branches:
      - 'master'

jobs:
  npm-publish-dry-run:
    name: npm-publish-dry-run
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Publish Dry run
        uses: JS-DevTools/npm-publish@v1
        with:
          token: ${{ secrets.NPM_AUTH_TOKEN_V2 }}
          tag: dev
          dry-run: true
